<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Help people in Gaza and the West Bank">
  <meta name="author" content="napoleon">
  <title>napoleon</title>

  <!-- Import JetBrains Mono from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      line-height: 1.4;
      color: #222;
      text-align: center;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f4f4f4;
    }

    .container {
      max-width: 90%;
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    a {
      color: #007BFF;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #fff;
        background-color: #222;
      }
      .container {
        background: #333;
      }
      a {
        color: #1E90FF;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>napo.lol</h1>
    </header>
    <main>
      <p>Contact: <a href="mailto:me@napo.lol">me@napo.lol</a></p>
    </main>
    <footer>
      <p>Help people in Gaza and the West Bank. <br>
      <a href="https://napo.lol/donate?ref=napo.lol" target="_blank">UN CRISIS RELIEF</a></p>
    </footer>
  </div>
</body>
</html>
