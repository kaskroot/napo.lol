    /*! Typebase.less v0.1.0 | MIT License */
    /* Setup */
    html {
      font-family: 'JetBrains Mono', sans-serif; /* Use JetBrains Mono */
      font-size: 197.5%;
      -webkit-font-smoothing: antialiased;
    }

    /* Copy & Lists */
    p {
      line-height: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: 0;
    }

    ul, ol {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    ul li, ol li {
      line-height: 1.5rem;
    }

    ul ul, ol ul, ul ol, ol ol {
      margin-top: 0;
      margin-bottom: 0;
    }

    blockquote {
      line-height: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Headings */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'JetBrains Mono', sans-serif;
      margin-top: 1.5rem;
      margin-bottom: 0;
      line-height: 1.5rem;
    }

    h1 {
      font-size: 3.5rem;
      line-height: 4.5rem;
      margin-top: 0.7rem;
    }

    h2 {
      font-size: 2.828rem;
      line-height: 3rem;
      margin-top: 3rem;
    }

    h3 {
      font-size: 1.414rem;
    }

    h4 {
      font-size: 0.707rem;
    }

    h5 {
      font-size: 0.471rem;
    }

    h6 {
      font-size: 0.353rem;
    }

    /* Tables */
    table {
      margin-top: 1.5rem;
      border-spacing: 0px;
      border-collapse: collapse;
    }

    table td, table th {
      padding: 0;
      line-height: 33px;
    }

    /* Code blocks */
    code {
      vertical-align: bottom;
    }

    /* Leading paragraph text */
    .lead {
      font-size: 1.414rem;
    }

    /* Hug the block above you */
    .hug {
      margin-top: 0;
    }

    body {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 20px;
      color: #222;
      text-align: center; /* Centers all text */
    }

    a {
      text-decoration: underline;
      color: #222;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #fff;
        background-color: #222;
      }

      a {
        text-decoration: underline;
        color: #fff;
      }
    }
